<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >

    <meta name="description" content="Submit and review product ratings and feedback for installed products." >
    <meta name="author" content="Bright Owusu" >

    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>

  <body>
    <header>
      <h1>Product Review Form</h1>
    </header>

    <main>
      <form action="review.html" method="get" id="reviewForm">

        <!-- Product Name -->
        <label for="product">Product Name</label>
        <select id="product" name="product" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- Rating -->
        <fieldset>
          <legend>Overall Rating</legend>

          <input type="radio" id="rating1" name="rating" value="1" required />
          <label for="rating1">☆</label>

          <input type="radio" id="rating2" name="rating" value="2" required />
          <label for="rating2">☆☆</label>

          <input type="radio" id="rating3" name="rating" value="3" required />
          <label for="rating3">☆☆☆</label>

          <input type="radio" id="rating4" name="rating" value="4" required />
          <label for="rating4">☆☆☆☆</label>

          <input type="radio" id="rating5" name="rating" value="5" required />
          <label for="rating5">☆☆☆☆☆</label>

        </fieldset>

        <!-- Date -->
        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required />

        <!-- Features -->
        <fieldset>
          <legend>Useful Features</legend>

          <input type="checkbox" id="feat-durability" name="features" value="durability" />
          <label for="feat-durability">Durability</label>

          <input type="checkbox" id="feat-performance" name="features" value="performance" />
          <label for="feat-performance">Performance</label>

          <input type="checkbox" id="feat-design" name="features" value="design" />
          <label for="feat-design">Design</label>

          <input type="checkbox" id="feat-value" name="features" value="value" />
          <label for="feat-value">Value</label>

        </fieldset>

        <!-- Review -->
        <label for="review">Written Review</label>
        <textarea id="review" name="review" rows="5"></textarea>

        <!-- Username -->
        <label for="username">User Name</label>
        <input type="text" id="username" name="username" />

        <!-- Submit -->
        <input type="submit" value="Submit Review" />

      </form>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> Product Review System</p>
    </footer>

    <script src="js/script.js" defer></script>
  </body>
</html>
