<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Temple Album</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS Files -->
  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css">

  <!-- JavaScript -->
  <script src="scripts/temples.js" defer></script>
</head>

<body>

  <header>
    <h1>Temple Album</h1>

    <!-- Hamburger Button -->
    <button id="menu-button">☰</button>

    <nav>
      <a href="#">Home</a>
      <a href="#">Old</a>
      <a href="#">New</a>
      <a href="#">Large</a>
      <a href="#">Small</a>
    </nav>
  </header>

  <main>
    <h2>Favorite Temples</h2>

    <section class="gallery">

      <figure>
        <img src="images/temple1.webp" alt="Temple 1">
        <figcaption>Accra Ghana Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple2.webp" alt="Temple 2">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple3.webp" alt="Temple 3">

      </figure>

      <figure>
        <img src="images/temple4.webp" alt="Temple 4">

      </figure>

      <figure>
        <img src="images/temple5.webp" alt="Temple 5">
        <figcaption>Paris France Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple6.webp" alt="Temple 6">
        <figcaption>Nairobi Kenya Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple7.webp" alt="Temple 7">
        <figcaption>Sydney Australia Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple8.webp" alt="Temple 8">
        <figcaption>Mexico City Temple</figcaption>
      </figure>

      <figure>
        <img src="images/temple9.webp" alt="Temple 9">
        <figcaption>Johannesburg Temple</figcaption>
      </figure>

    </section>
  </main>

  <footer>
    <p>
      &copy; <span id="currentyear"></span> Bright Owusu | Ghana
    </p>

    <p id="lastModified"></p>
  </footer>

</html>
