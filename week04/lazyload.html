<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy Loading Images</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main>
    <h1>Lazy Loading Image Gallery</h1>

    <!-- 6 images -->
    <img src="https://picsum.photos/400/600?random=1" loading="lazy" alt="Image 1" />
    <img src="https://picsum.photos/400/600?random=2" loading="lazy" alt="Image 2" />
    <img src="https://picsum.photos/400/600?random=3" loading="lazy" alt="Image 3" />
    <img src="https://picsum.photos/400/600?random=4" loading="lazy" alt="Image 4" />
    <img src="https://picsum.photos/400/600?random=5" loading="lazy" alt="Image 5" />
    <img src="https://picsum.photos/400/600?random=6" loading="lazy" alt="Image 6" />
  </main>

  <footer>
    <p>© <span id="year"></span> Lazy Load Demo</p>
    <p>Last Modified: <span id="lastModified"></span></p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
